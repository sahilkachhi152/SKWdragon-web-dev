<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Layout</title>
    <style>
        * {
            margin: 0;
            padding: 0;
        }
        header{
            position: sticky;
            top: 0;
        }
        nav {
            background-color: palevioletred;
            height: 83px;
           
        }
      main{
            color: white;
            background-color: black;
            padding: 34px;
        }

        .container {
            background-color: green;
            margin: 12px 34px;
            padding: 55 px 23px;
          text-align: center;

        }

        .box1 {
            height: 70vh;
            width: 45%;
            background-color: pink;
            display: inline-block;
            margin: 0 12px;
        }

        .box2 {
            height: 70vh;
            width: 45%;
            background-color: blue;
            display: inline-block;
            margin: 0 12px;
        }
        .text-box{
            padding: 34px;
            border: 2px solid white;
             margin: 50px 34px;
             font-size: 2em;
             border-radius: 13px;
        }
        .orange-box{
            height: 30px;
            width: 30px;
            background-color: orange;
            border-radius: 60px;
            bottom: 15px;
            position: fixed;
            right: 23px;
        }
        footer{
            height: 100px;
            background-color: bisque;
        }
    </style>
</head>

<body>
    <header>
        <nav>

        </nav>
    </header>

    <main>
        <div class="container">
            <div class="box1"></div>
            <div class="box2"></div>
        </div>
        <div class="text-box">
            <p>Welocome to sigma web development express</p>
        </div>
        <div class="orange-box">

        </div>
    </main>

    <footer>

    </footer>
</body>

</html>
