<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS ibject fit and position</title>
    <style>
        .container {
            height: 488px;
            width: 466px;
            border: 2px solid black;
            /* background-color: azure; */
            background-position: center center;

            background-image: url("https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQn2nmWoa-66Yo5xylQwIiAxtvMrK2pB2l4CA&s");
            background-repeat: no-repeat;
            background-clip: border-box;
        }

        img {
            width: 466px;
            height: 488px;
            /* object-fit: cover; */
            /* object-fit: fill; */
            /* object-fit: scale-down; */
            object-position: 10px 20px;
            object-fit: contain;
        }
    </style>
</head>

<body>
    <div class="container">
        <!-- <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQn2nmWoa-66Yo5xylQwIiAxtvMrK2pB2l4CA&s" alt="1"> -->
    </div>
</body>

</html>
