<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box {
            height: 121px;
            width: 121px;
            background-color: red;
            position: absolute;
            border-radius: 70px;
            bottom: 0;
            left: 0;
            /* transform: translateY(-100px);
            transform: translatex(100px);
            transition: transform 3s ease-in-out; */
            animation: mohitKaAnimation 1s ease-out 1ms infinite, mohit2 1s ease-in-out 1ms infinite;
            /* animation-fill-mode: forwards; */
            animation-direction: alternate;

        }

        @keyframes mohitKaAnimation {
            from {
                /* transform: translateX(0px); */

            }

            to {
                transform: translateY(-1000px);
               
            }
        }

        @keyframes mohit2 {
            from {
                /* transform: translateY(0px); */
            }

            to {
                 transform: translateX(400px);
            }
        }

        .container {
            position: relative;
            height: 80vh;
            width: 80vw;
            background-color: blue;
        }
    </style>
</head>

<body>
    <div class="container">

        <div class="box"></div>
    </div>
</body>

</html>
