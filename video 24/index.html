<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box{
            border: 2px solid darkblue ;
            padding: 34px;
            /* box-shadow: h-offset v-offset blur spread color inset ; */
            box-shadow: 5px 5px 15px 5px #9e1b1b;
            text-shadow: 2px 2px 4px 
            #9e1b1b;
        }
        /* .text-shadow: h-offset v-offset blur color; */
        .text-shadow{
            text-shadow: 4px 4px 4px #de25f3;
            outline: 2px solid #de25f3;
        }
        /* .box:hover{
            background-color: #f1ff2c;
        } */
         /* outline: width style color; */
    </style>
</head>
<body>
    <div class="box">
        I am a box
    </div>
    <p class="text-shadow">
        Lorem ipsum dolor sit amet consectetur, adipisicing elit. Ad odio id soluta voluptatum aliquam tempora expedita dolorem, totam quidem perferendis aperiam, molestias corporis, illo recusandae est hic voluptates error. Praesentium ipsa laborum quod nobis.
    </p>
</body>
</html>
