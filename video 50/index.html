<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Filters</title>
    <style>
        img{
            /* filter: blur(5px); */
           
        }
        .img1{
            filter: brightness(122%) contrast();
        }
        .img2{
            /* filter: invert(); */
           filter: opacity(0.7);
        }
        .img3{
            /* filter: grayscale(54%) ; */
            filter: sepia(60%);
        }
    </style>
</head>
<body>
    <div class="container">
        <img class="img1" src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRUT2jLYoIC9Lg65AVA5KhEUdJdWFm0-vznZg&s" alt="1">
        <img class="img2" src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRsFmXtnz96UNAiSU6bmeuzqyFF0hM784lekQ&s" alt="srk">
        <img class="img3" src="https://staticprintenglish.theprint.in/wp-content/uploads/2025/11/feature-image-1-696x392.jpg?compress=true&quality=80&w=376&dpr=2.6" alt="srk">
    </div>
</body>
</html>
