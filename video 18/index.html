<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Boxmodel</title>
    <style>
        * {
            margin: 0;
            padding: 0;
        }

        .box {
            background-color: aqua;
        }

        .box1 {
            color: yellow;
            padding: 10px;
            margin: 25px;
            border: 2px solid blue;
            height: 200px;
            box-sizing: border-box;
        }

        .box2 {
            color: red;
            padding: 10px;
            margin: 25px;
            border: 2px solid black;
            height: 200px;
            box-sizing: border-box;
        }

        a:hover {
            background-color: yellow;
        }
        .google{
            background-color: rgb(225, 172, 85);
            margin: 25px;
            padding: 10px;
            border:2px solid black;
            height: 200px;
            box-sizing: border-box;
            text-align: center;

        }
    </style>
</head>

<body>
    <div class="box box1">I am a box </div>
    <div class="box box2">I am another box</div>
    <div class="google">
        <a href="https://www.google.com">google</a>
    </div>
</body>

</html>
