<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Selectors - SKWdragon</title>
    <style>
        /* Element selector */
         div{
            /* background-color: red ; */
        }
        /* class selector  */
        .red{
            background-color: red;
        }
        /* ID selector  */
        #green{
            background-color: green;
        }
        /* Child selector  */
        div > p {
            color: yellow;
            background-color: brown;
        }
        /* Descendent selector  */
        div p {
            color: yellow;
            background-color: brown;
        }
        /* universal selector  */
        *{ 
            margin: 0;
            padding: 0;
        }
        /* Pseudo selector  */  
        a:visited {
            color: rgb(223, 61, 228);
        }
        a:link {
            color: green;
        }
        a:active{
            background-color: rgb(91, 91, 239);
        }
        a:hover{
            background-color: yellow;
        }
        p:first-child{
            background-color: aqua;
        }
        </style>

</head>
<body>
    <main class="one">
        <p>I am first para </p>
        <p>I am second para</p>
    </main>
    <div class="red">
        I am div
        <article>
          <p>I am a para inside div</p>
        </article>
    </div>
    <div id="green">
        I am another div
    </div>
    <a href="https://www.google.com">Go to Google</a>
    <a href="https://www.Facebook.com">Go to Facebook</a>
    <a href="https://www.Facebook.com">Go to Facebook</a>
    <a href="https://www.Facebook.com">Go to Facebook</a>
</body>
</html>
